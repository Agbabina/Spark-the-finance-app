service:
  - type: web
    name: spark-frontend
    runtime: static
    plan: free
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sparkbackend-h2g7.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
